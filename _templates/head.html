<meta name="google-adsense-account" content="ca-pub-9094916118868532">
<link rel="stylesheet" href="/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.webp">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐠</text></svg>">
<script>
// AdSense lazy load — lädt adsbygoogle.js erst bei scroll/interaction (spart ~200KB initial load)
(function(){
  var loaded = false;
  function loadAds() {
    if (loaded) return;
    loaded = true;
    var s = document.createElement('script');
    s.async = true;
    s.crossOrigin = 'anonymous';
    s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9094916118868532';
    document.head.appendChild(s);
  }
  // Events die AdSense laden
  window.addEventListener('scroll', loadAds, { once: true, passive: true });
  window.addEventListener('mousemove', loadAds, { once: true, passive: true });
  window.addEventListener('touchstart', loadAds, { once: true, passive: true });
  // Fallback: nach 3s trotzdem laden (für Bounce/No-Interaction)
  setTimeout(loadAds, 3000);
})();
</script>
